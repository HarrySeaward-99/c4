<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/styles.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shows - C4 Comedy</title>

  <!-- Favicon links -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    body {
      background-image: url('/C4-Logo.PNG');
      background-repeat: repeat;
      background-position: center top;
      /* background-attachment: fixed; */ /* commented out for smooth scrolling */
      position: relative;
      font-family: sans-serif;
      background-color: #111;
      color: white;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      font-size: clamp(3.5rem, 12vw, 10rem);
      font-weight: bold;
      margin: 0.5rem 0;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 4px 4px 0 #000, 7px 7px 0 #000;
    }

    nav {
      margin: 1rem 0 2rem;
      text-align: center;
    }

    nav a {
      color: #ffcc00;
      text-decoration: none;
      font-size: 1.4rem;
      margin: 0 1.5rem;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
      transition: color 0.3s;
    }

    nav a:hover {
      color: white;
    }

    main {
      flex: 1;
      text-align: center;
    }

    .poster-container {
     margin: 1.5rem auto 3rem;   /* auto left/right = centers horizontally */
     text-align: center;         /* fallback for older browsers */
     max-width: 90%;
     width: 100%;                /* ensures it takes full available width */
    }

    .poster {
      max-width: 100%;
      height: auto;
      max-height: 70vh;
      display: block;
      margin: 0 auto;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
    }

    .eventbrite-btn {
      display: inline-block;
      background: linear-gradient(135deg, #ffcc00, #ff9900);
      color: #000;
      font-weight: bold;
      font-size: 1.3rem;
      padding: 1rem 2.5rem;
      border-radius: 50px;
      text-decoration: none;
      margin: 2rem 0;
      box-shadow: 0 6px 20px rgba(255, 204, 0, 0.4);
      transition: all 0.3s ease;
    }

    .eventbrite-btn:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 10px 30px rgba(255, 204, 0, 0.6);
      background: linear-gradient(135deg, #ffdd33, #ffaa00);
    }

    p {
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      line-height: 1.6;
      margin: 1.4rem 0;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    footer {
      text-align: center;
      padding: 2rem 0;
      font-size: 1rem;
      opacity: 0.8;
      margin-top: auto;
    }

    /* Responsive background scaling */
    body {
      background-size: 220px auto;
    }

    @media (min-width: 640px) {
      .container { padding: 3rem 4rem; }
      h1 { font-size: clamp(6rem, 10vw, 12rem); }
      body { background-size: 320px auto; }
    }

    @media (min-width: 1024px) {
      body { background-size: 450px auto; }
      h1 { font-size: clamp(9rem, 9vw, 14rem); }
      .poster { max-height: 75vh; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>SHOWS</h1>
    </header>

    <nav>
      <a href="/">Home</a>
      <a href="/about/">About</a>
      <a href="/shows/">Shows</a>
    </nav>

    <main>
      <p>Upcoming live comedy shows and events at C4 Comedy. Get tickets and stay in the loop!</p>

      <!-- Foreground poster image -->
      <div class="poster-container">
        <img 
          src="/C4 Poster with Sketches.PNG" 
          alt="C4 Comedy Show Poster with Sketches" 
          class="poster"
        >
      </div>

      <!-- Eventbrite button/link -->
      <a 
        href="https://c4comedylive.eventbrite.com" 
        target="_blank" 
        rel="noopener noreferrer" 
        class="eventbrite-btn"
      >
        Get Tickets on Eventbrite
      </a>

      <p>Check back for upcoming dates, lineups, and more explosive comedy nights!</p>
    </main>

    <footer>
      © 2026 C4 Comedy
    </footer>
  </div>
</body>
</html>
