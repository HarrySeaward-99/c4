<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/styles.css">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C4 Comedy</title>

  <!-- Favicon links -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    body {
      background-image: url('/C4-Logo.PNG');
      background-repeat: repeat;
      background-position: center top;
      background-attachment: fixed;
      position: relative;
      font-family: sans-serif;
      background-color: #111;
      color: white;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1;
      pointer-events: none;
    }
    .content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem 1rem;
    }
    nav {
      margin: 1.5rem 0 2rem;
      width: 100%;
    }
    nav a {
      color: #ffcc00;
      text-decoration: none;
      font-size: 1.4rem;
      margin: 0 1.5rem;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
      transition: color 0.3s;
    }
    nav a:hover {
      color: white;
    }
    .logo-container {
      margin: 1rem 0 3rem;
      max-width: 80%;
    }
    .logo {
      max-width: 100%;
      height: auto;
      max-height: 55vh;
      width: auto;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.7));
    }
    /* Social & email footer (override or extend styles.css if needed) */
    footer {
      margin-top: auto;
      padding: 2rem 0 3rem;
      text-align: center;
      font-size: 1rem;
      opacity: 0.85;
    }
    .social-links {
      margin-bottom: 1rem;
    }
    .social-icon {
      width: 40px;
      height: 40px;
      margin: 0 1rem;
      vertical-align: middle;
      transition: transform 0.3s;
    }
    .social-icon:hover {
      transform: scale(1.15);
    }
    .email-link {
      color: #ffcc00;
      text-decoration: none;
      font-weight: bold;
    }
    .email-link:hover {
      color: white;
      text-decoration: underline;
    }
    /* Responsive background scaling */
    body {
      background-size: 220px auto;
    }
    @media (min-width: 640px) {
      body { background-size: 320px auto; }
      .logo { max-height: 60vh; }
    }
    @media (min-width: 1024px) {
      body { background-size: 450px auto; }
      .logo { max-height: 65vh; }
    }
    @media (min-width: 1440px) {
      body { background-size: 520px auto; }
      .logo { max-height: 70vh; }
    }
  </style>
</head>
<body>
  <div class="content">
    <nav>
      <a href="/about/">About C4</a>
      <a href="/shows/">Shows</a>
    </nav>

    <!-- Foreground logo -->
    <div class="logo-container">
      <img
        src="/C4- Explosion.PNG"
        alt="C4 Comedy Explosion Logo"
        class="logo"
      >
    </div>

    <!-- Social & email footer -->
  <footer>
      <div class="social-links">
        <a href="https://www.instagram.com/c4comedylive/" target="_blank" rel="noopener noreferrer">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg"
            alt="Follow us on Instagram"
            class="social-icon"
          >
        </a>
      </div>

     <div class="social-links">...</div>
  <div>© 2026 C4 Comedy • </div> <!-- script will inject the link here -->
    </footer>
  </div>
  <script>
  // Simple obfuscation - bots without JS won't reconstruct it
  (function() {
    var user = 'c4comedylive';
    var domain = 'gmail.com';
    var link = document.createElement('a');
    link.href = 'mailto:' + user + '@' + domain;
    link.className = 'email-link';
    link.textContent = user + '@' + domain;
    document.querySelector('footer div:last-child').innerHTML = '© 2026 C4 Comedy • ';
    document.querySelector('footer div:last-child').appendChild(link);
  })();
</script>
</body>
</html>
